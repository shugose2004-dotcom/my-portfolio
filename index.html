<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VR昆虫採集</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
    margin:0;
}
#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:10px;
    font-size:20px;
    z-index:999;
}
</style>
</head>

<body>

<div id="score">
捕獲数：0
</div>

<a-scene>

<a-sky color="#87CEEB"></a-sky>

<a-plane
rotation="-90 0 0"
width="100"
height="100"
color="#3CB371">
</a-plane>

<a-camera position="0 1.6 5">
<a-cursor></a-cursor>
</a-camera>

<a-sphere
id="bug1"
class="bug"
position="0 2 -5"
radius="0.2"
color="red">
</a-sphere>

<a-sphere
id="bug2"
class="bug"
position="4 3 -8"
radius="0.2"
color="yellow">
</a-sphere>

<a-sphere
id="bug3"
class="bug"
position="-3 2 -10"
radius="0.2"
color="blue">
</a-sphere>

</a-scene>

<script>

let score = 0;

const bugs = document.querySelectorAll(".bug");

bugs.forEach(function(bug){

    bug.addEventListener("click",function(){

        score++;

        document.getElementById("score").innerHTML =
        "捕獲数：" + score;

        bug.setAttribute("visible",false);

    });

});

AFRAME.registerComponent("fly-bug",{

    init:function(){

        this.angle = Math.random()*360;

    },

    tick:function(){

        this.angle += 0.02;

        let x = Math.sin(this.angle)*2;
        let y = 2 + Math.cos(this.angle)*0.5;

        this.el.object3D.position.x +=
        (x-this.el.object3D.position.x)*0.02;

        this.el.object3D.position.y +=
        (y-this.el.object3D.position.y)*0.02;

    }

});

document.querySelectorAll(".bug").forEach(function(bug){

    bug.setAttribute("fly-bug","");

});

</script>

</body>
</html>
